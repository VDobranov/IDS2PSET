repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ['--maxkb=20480']  # 20MB для wheel файлов
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json

  - repo: https://github.com/psf/black
    rev: 24.1.0
    hooks:
      - id: black
        language_version: python3

  - repo: https://github.com/pycqa/flake8
    rev: 7.0.0
    hooks:
      - id: flake8
        args: [--max-line-length=100, --extend-ignore=E203]

  - repo: local
    hooks:
      - id: pytest
        name: pytest
        entry: bash -c 'source .venv/bin/activate && PYTHONPATH=src pytest tests/ -v'
        language: system
        pass_filenames: false
        always_run: true
        require_serial: true

      - id: js-test
        name: node --test
        entry: node --test tests/test.js
        language: system
        pass_filenames: false
        always_run: true
        files: \.(js|html|css)$
