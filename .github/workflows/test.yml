name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Create virtual environment
        run: |
          python -m venv .venv
          source .venv/bin/activate

      - name: Install dependencies
        run: |
          source .venv/bin/activate
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install ifcopenshell

      - name: Run pytest with coverage and IFC validation
        run: |
          source .venv/bin/activate
          PYTHONPATH=src pytest tests/ -v --cov=src --cov-report=term-missing --cov-fail-under=90 --cov-omit='src/gherkin_validator.py'
          echo "✓ Все тесты прошли, включая валидацию IFC"

  js-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Run JS tests
        run: node --test tests/test.js

  validate-results:
    runs-on: ubuntu-latest
    needs: [python-tests, js-tests]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install ifcopenshell

      - name: Run full test suite with IFC validation
        run: |
          source .venv/bin/activate
          PYTHONPATH=src pytest tests/test_validator.py::TestIntegration -v
          echo "✓ Валидация IFC прошла успешно"
